name: "Spotless"

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      -
        name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      -
        name: "Setup JDK"
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      -
        name: "Run spotless"
        run: mvn --batch-mode spotless:check
